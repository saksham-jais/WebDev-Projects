# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}




spring.datasource.hikari.maximum-pool-size=5
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# Security Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
encryption.key=${ENCRYPTION_KEY}
superadmin.username=${SUPER_ADMIN_USERNAME:sakshamjais100@gmail.com}
superadmin.password=${SUPER_ADMIN_PASSWORD:Saksham#123}
superadmin.email=${SUPER_ADMIN_EMAIL:sakshamjais100@gmail.com}

# Actuator Configuration
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.health.db.enabled=true

# Cloudinary (server-side upload signing)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

